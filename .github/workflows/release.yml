name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  changelog:
    name: Extract changelog
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.extract.outputs.notes }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for tag
        id: extract
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Find the section header matching this tag (e.g. "## v0.2-alpha1")
          # and extract everything until the next "## " header or end of file.
          if ! grep -qE "^## ${TAG}( |$)" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no entry for ${TAG}. Add a '## ${TAG}' section before tagging."
            exit 1
          fi

          # Extract the section body (everything between this header and the next ## or EOF)
          NOTES=$(awk -v tag="## ${TAG}" '
            BEGIN { found=0 }
            $0 ~ "^"tag"( |$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md)

          # Strip leading/trailing blank lines
          NOTES=$(echo "$NOTES" | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba}')

          if [ -z "$NOTES" ]; then
            echo "::error::CHANGELOG.md entry for ${TAG} is empty. Add release notes before tagging."
            exit 1
          fi

          # Write to output using heredoc delimiter
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.zig_target }}
    needs: changelog
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - zig_target: x86_64-linux-musl
            nix_bundle: libssh-x86_64-musl
            arch_tag: x86_64
            deb_arch: amd64
            rpm_arch: x86_64
          - zig_target: aarch64-linux-musl
            nix_bundle: libssh-aarch64-musl
            arch_tag: aarch64
            deb_arch: arm64
            rpm_arch: aarch64
          - zig_target: riscv64-linux-musl
            nix_bundle: libssh-riscv64-musl
            arch_tag: riscv64
            deb_arch: riscv64
            rpm_arch: riscv64

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Install packaging tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ruby rpm
          sudo gem install fpm --no-document

      # Install Nix to build a deterministic musl-linked libssh bundle for this
      # matrix target.  Binary caches at cache.nixos.org supply pre-built
      # derivations so no source compilation is needed in most cases.
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build libssh static bundle for ${{ matrix.zig_target }}
        run: |
          echo "LIBSSH_DIR=$(nix build .#${{ matrix.nix_bundle }} --no-link --print-out-paths)" >> "$GITHUB_ENV"

      - name: Build release binary
        run: |
          zig build -Doptimize=ReleaseSafe \
            -Dtarget=${{ matrix.zig_target }} \
            -Dlibssh_dir="${{ env.LIBSSH_DIR }}"

      - name: Stage files
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          mkdir -p stage/usr/local/bin
          mkdir -p stage/etc/stardust
          mkdir -p stage/lib/systemd/system

          cp zig-out/bin/stardust    stage/usr/local/bin/stardust
          cp config.yaml             stage/etc/stardust/config.yaml
          cp packaging/stardust.service stage/lib/systemd/system/stardust.service

      - name: Build tarball
        run: |
          TARBALL="stardust-${{ matrix.arch_tag }}-linux.tar.gz"
          mkdir -p dist pkg
          cp stage/usr/local/bin/stardust pkg/
          cp stage/etc/stardust/config.yaml pkg/
          cp packaging/stardust.service pkg/
          cp packaging/stardust.openrc pkg/
          tar -czf "dist/$TARBALL" -C pkg stardust config.yaml stardust.service stardust.openrc
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Build .deb package
        run: |
          DEB_VERSION="${VERSION//-/\~}"
          fpm \
            --input-type dir \
            --output-type deb \
            --name stardust \
            --version "$DEB_VERSION" \
            --architecture ${{ matrix.deb_arch }} \
            --description "Lightweight DHCP server (RFC 2131/2132)" \
            --url "https://github.com/${{ github.repository }}" \
            --maintainer "Stardust contributors" \
            --license "MIT" \
            --package "dist/stardust_${DEB_VERSION}_${{ matrix.deb_arch }}.deb" \
            stage/usr/local/bin/stardust=/usr/local/bin/stardust \
            "stage/etc/stardust/config.yaml=/etc/stardust/config.yaml" \
            "stage/lib/systemd/system/stardust.service=/lib/systemd/system/stardust.service"

      - name: Build .rpm package
        run: |
          RPM_VERSION="${VERSION//-/.}"
          fpm \
            --input-type dir \
            --output-type rpm \
            --name stardust \
            --version "$RPM_VERSION" \
            --architecture ${{ matrix.rpm_arch }} \
            --description "Lightweight DHCP server (RFC 2131/2132)" \
            --url "https://github.com/${{ github.repository }}" \
            --maintainer "Stardust contributors" \
            --license "MIT" \
            --package "dist/stardust-${RPM_VERSION}-1.${{ matrix.rpm_arch }}.rpm" \
            stage/usr/local/bin/stardust=/usr/local/bin/stardust \
            "stage/etc/stardust/config.yaml=/etc/stardust/config.yaml" \
            "stage/lib/systemd/system/stardust.service=/usr/lib/systemd/system/stardust.service"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stardust-${{ matrix.arch_tag }}
          path: dist/

  release:
    name: Create release
    needs: [changelog, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: "dist/*"
          body: ${{ needs.changelog.outputs.notes }}
